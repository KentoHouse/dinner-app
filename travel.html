<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上輋七遊濟州</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase App (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <!-- Firebase Auth (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <!-- Firebase Firestore (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .bg-gradient-header { background: linear-gradient(to bottom, rgba(2,6,23,0) 0%, rgba(2,6,23,0.8) 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Firebase 配置由環境自動注入
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'jeju-travel-2026';

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                MapPin: <><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></>,
                Car: <><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 13.1v2.9c0 .6.4 1 1 1h2" /><circle cx="7" cy="17" r="2" /><circle cx="17" cy="17" r="2" /></>,
                Utensils: <><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2" /><path d="M7 2v20" /><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" /></>,
                Home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></>,
                X: <><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></>,
                Save: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" /><polyline points="17 21 17 13 7 13 7 21" /><polyline points="7 3 7 8 15 8" /></>,
                Edit3: <><path d="M12 20h9" /><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" /></>,
                Unlock: <><path d="M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2zM7 11V7a5 5 0 0 1 10 0v4" /></>,
                Cloud: <><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.1-3.9-4.5-1.1-2.9-3.9-5-7.1-5-3.3 0-6.1 2.2-7.1 5.2-2.1.5-3.9 2.4-3.9 4.8C0 17.5 2 19.5 4.5 19.5" /></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [selectedDay, setSelectedDay] = useState(null);
            const [isEditing, setIsEditing] = useState(false);
            const [activeTab, setActiveTab] = useState('attractions');
            const [loading, setLoading] = useState(true);
            const [db, setDb] = useState(null);

            const initialData = {
                0: { date: "27/7", day: "星期一", title: "漢拏山國家公園", img: "https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?auto=format&fit=crop&q=80&w=1200&h=800&sig=101", transport: "", food: "", attractions: "", lodging: "" },
                1: { date: "28/7", day: "星期二", title: "城山日出峰", img: "https://images.unsplash.com/photo-1528150230181-99bbf7b22162?auto=format&fit=crop&q=80&w=1200&h=800&sig=102", transport: "", food: "", attractions: "", lodging: "" },
                2: { date: "29/7", day: "星期三", title: "萬丈窟", img: "https://images.unsplash.com/photo-1533230393279-7833ede3e244?auto=format&fit=crop&q=80&w=1200&h=800&sig=103", transport: "", food: "", attractions: "", lodging: "" },
                3: { date: "30/7", day: "星期四", title: "天帝淵瀑布", img: "https://images.unsplash.com/photo-1621873105342-63b7238290f1?auto=format&fit=crop&q=80&w=1200&h=800&sig=104", transport: "", food: "", attractions: "", lodging: "" },
                4: { date: "31/7", day: "星期五", title: "大浦柱狀節理帶", img: "https://images.unsplash.com/photo-1603566629039-dd617883d07f?auto=format&fit=crop&q=80&w=1200&h=800&sig=105", transport: "", food: "", attractions: "", lodging: "" },
                5: { date: "1/8", day: "星期六", title: "咸德海邊", img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&q=80&w=1200&h=800&sig=106", transport: "", food: "", attractions: "", lodging: "" },
            };

            const [travelData, setTravelData] = useState(initialData);
            const [editBuffer, setEditBuffer] = useState("");

            useEffect(() => {
                const initializeFirebase = async () => {
                    try {
                        if (!firebase.apps.length) {
                            firebase.initializeApp(firebaseConfig);
                        }
                        const auth = firebase.auth();
                        const firestore = firebase.firestore();
                        setDb(firestore);

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }

                        const unsubscribe = auth.onAuthStateChanged((u) => {
                            setUser(u);
                            if (!firebaseConfig.apiKey) setLoading(false);
                        });
                        return () => unsubscribe();
                    } catch (e) {
                        setLoading(false);
                        console.error("Firebase Init Error:", e);
                    }
                };
                initializeFirebase();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const path = `artifacts/${appId}/public/data/travelPlan`;
                const unsubscribe = db.collection(path).onSnapshot((snapshot) => {
                    const updatedData = { ...initialData };
                    snapshot.forEach((doc) => {
                        const dayKey = parseInt(doc.id);
                        if (updatedData.hasOwnProperty(dayKey)) {
                            updatedData[dayKey] = { ...updatedData[dayKey], ...doc.data() };
                        }
                    });
                    setTravelData(updatedData);
                    setLoading(false);
                }, (err) => {
                    console.error("Sync Data Error:", err);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user, db]);

            const handleSave = async (dayIndex, category) => {
                if (!user || !db) return;
                try {
                    const path = `artifacts/${appId}/public/data/travelPlan`;
                    await db.collection(path).doc(dayIndex.toString()).set({
                        [category]: editBuffer
                    }, { merge: true });
                    setIsEditing(false);
                } catch (error) {
                    console.error("Save Error:", error);
                }
            };

            const tabs = [
                { id: 'transport', label: '交通', icon: "Car" },
                { id: 'food', label: '美食', icon: "Utensils" },
                { id: 'attractions', label: '景點', icon: "MapPin" },
                { id: 'lodging', label: '住宿', icon: "Home" },
            ];

            const closeModal = () => { setSelectedDay(null); setIsEditing(false); };

            if (loading && !user && firebaseConfig.apiKey) {
                return (
                    <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-cyan-500 font-black gap-4">
                        <Icon name="Cloud" size={48} className="animate-bounce" />
                        <div className="animate-pulse tracking-widest uppercase text-xs">正在連接雲端行程表...</div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-950 text-white p-4 sm:p-8 animate-in">
                    <header className="max-w-7xl mx-auto text-center mb-12">
                        <h1 className="text-5xl font-black mb-4 bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-500 tracking-tight">上輋七遊濟州</h1>
                        <div className="flex flex-col items-center gap-2">
                            <div className="inline-block px-5 py-1.5 rounded-full bg-slate-800 border border-slate-700 text-slate-400 text-sm font-bold shadow-2xl tracking-wide">2026年 7月27日 至 8月1日</div>
                            <div className="text-[10px] text-slate-600 flex items-center gap-1.5 uppercase tracking-widest font-bold">
                                <Icon name="Cloud" size={12} /> {user ? '雲端同步連線中' : '準備同步中'}
                            </div>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto">
                        {Object.keys(travelData).map((key) => {
                            const item = travelData[key];
                            return (
                                <div key={key} onClick={() => { setSelectedDay(key); setEditBuffer(travelData[key][activeTab] || ""); setIsEditing(false); }}
                                    className="group relative h-80 rounded-[2.5rem] overflow-hidden cursor-pointer shadow-2xl transition-all duration-500 hover:-translate-y-2 bg-slate-900 border border-white/5">
                                    <img src={item.img} alt={item.title} className="absolute inset-0 w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/95 via-black/10 to-transparent" />
                                    <div className="absolute inset-0 p-8 flex flex-col justify-end">
                                        <div className="flex items-center gap-3 mb-3">
                                            <div className="bg-cyan-500 text-slate-950 px-3 py-1 rounded-lg font-black text-sm shadow-lg">{item.date}</div>
                                            <div className="text-cyan-400 font-black tracking-widest text-sm uppercase">{item.day}</div>
                                        </div>
                                        <h2 className="text-3xl font-black text-white group-hover:text-cyan-400 transition-colors drop-shadow-xl">{item.title}</h2>
                                        <div className="mt-4 w-12 h-1 bg-cyan-500/30 rounded-full transition-all duration-500 group-hover:w-full group-hover:bg-cyan-400" />
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {selectedDay !== null && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/95 backdrop-blur-xl">
                            <div className="bg-slate-900 w-full max-w-2xl rounded-[3rem] overflow-hidden shadow-2xl border border-white/10 flex flex-col max-h-[90vh] animate-in">
                                <div className="relative h-64 flex-shrink-0 bg-slate-800 border-b border-white/5">
                                    <img src={travelData[selectedDay].img} className="w-full h-full object-cover opacity-60" alt="header" />
                                    <div className="absolute inset-0 bg-gradient-to-b from-black/20 to-slate-900" />
                                    <button onClick={closeModal} className="absolute top-8 right-8 p-3 bg-black/50 rounded-full text-white hover:bg-black/80 transition-all border border-white/10 shadow-lg"><Icon name="X" size={24} /></button>
                                    <div className="absolute bottom-8 left-10">
                                        <div className="flex items-center gap-2 mb-3">
                                            <span className="bg-cyan-500 text-slate-950 px-3 py-0.5 rounded-lg text-[10px] font-black uppercase tracking-widest shadow-lg">DAY {parseInt(selectedDay) + 1}</span>
                                            <span className="text-cyan-300 font-bold tracking-widest">{travelData[selectedDay].date} ({travelData[selectedDay].day})</span>
                                        </div>
                                        <h3 className="text-4xl font-black text-white tracking-tighter drop-shadow-2xl">{travelData[selectedDay].title}</h3>
                                    </div>
                                </div>

                                <div className="flex p-3 bg-slate-950/80 border-b border-white/5 overflow-x-auto no-scrollbar">
                                    {tabs.map((tab) => (
                                        <button key={tab.id} onClick={() => { setActiveTab(tab.id); setEditBuffer(travelData[selectedDay][tab.id] || ""); setIsEditing(false); }}
                                            className={`flex-1 py-4 px-2 min-w-[90px] flex flex-col items-center gap-2 rounded-2xl transition-all duration-300 ${activeTab === tab.id ? 'bg-cyan-500/10 text-cyan-400' : 'text-slate-500 hover:text-slate-300 hover:bg-white/5'}`}>
                                            <Icon name={tab.icon} size={20} />
                                            <span className="text-[10px] font-black uppercase tracking-widest">{tab.label}</span>
                                        </button>
                                    ))}
                                </div>

                                <div className="p-10 flex-1 overflow-y-auto bg-slate-900">
                                    {!isEditing ? (
                                        <div className="space-y-8 animate-in">
                                            <div className="flex items-center justify-between">
                                                <div className="flex items-center gap-2 text-slate-500"><Icon name="MapPin" size={16} /><span className="text-[10px] font-black uppercase tracking-widest">{tabs.find(t => t.id === activeTab).label} 資訊欄</span></div>
                                                <button onClick={() => { setEditBuffer(travelData[selectedDay][activeTab] || ""); setIsEditing(true); }} className="bg-slate-800 text-cyan-400 px-5 py-2.5 rounded-2xl text-xs font-black shadow-xl hover:bg-slate-700 transition-all border border-slate-700 active:scale-95"><Icon name="Edit3" size={14} className="inline mr-1.5"/>編輯內容</button>
                                            </div>
                                            <div className="bg-slate-950/50 border border-white/5 rounded-[2rem] p-8 min-h-[16rem] text-slate-200 text-xl whitespace-pre-wrap font-light tracking-wide shadow-inner leading-relaxed">
                                                {travelData[selectedDay][activeTab] || "這裡空空的... 點擊編輯鈕填寫大家都能看到的資訊吧！"}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="space-y-8 animate-in">
                                            <div className="flex items-center justify-between text-green-400 font-black">
                                                <div className="flex items-center gap-2"><Icon name="Unlock" size={18} /><span className="text-[10px] uppercase tracking-tighter">多人即時協作模式</span></div>
                                                <div className="flex gap-4">
                                                    <button onClick={() => setIsEditing(false)} className="text-slate-500 text-xs font-bold hover:text-white transition-colors">取消</button>
                                                    <button onClick={() => handleSave(selectedDay, activeTab)} className="bg-cyan-500 text-slate-950 px-8 py-3 rounded-2xl text-sm font-black shadow-cyan-500/30 shadow-2xl hover:bg-cyan-400 transition-all active:scale-95"><Icon name="Save" size={18} className="inline mr-2"/>確認同步</button>
                                                </div>
                                            </div>
                                            <textarea autoFocus value={editBuffer} onChange={(e) => setEditBuffer(e.target.value)} className="w-full h-72 bg-slate-950/50 border border-white/10 rounded-[2rem] p-8 text-slate-200 text-xl leading-relaxed focus:ring-4 focus:ring-cyan-500/20 outline-none shadow-inner transition-all" placeholder={`請輸入 ${tabs.find(t => t.id === activeTab).label} 的相關細節...`} />
                                        </div>
                                    )}
                                    <div className="mt-12 bg-cyan-500/5 p-8 rounded-[2rem] border border-cyan-500/10 flex items-start gap-5 shadow-inner">
                                        <div className="text-cyan-500 mt-1 flex-shrink-0"><Icon name="Cloud" size={24} /></div>
                                        <div>
                                            <h5 className="text-xs font-black text-cyan-500/80 mb-2 tracking-widest uppercase italic">雲端自動化同步系統</h5>
                                            <p className="text-xs text-slate-500 leading-relaxed italic font-medium">
                                                此行程表無需登入與密碼。您提交的所有變更都會即時推送到雲端數據庫，所有成員開啟網頁時都能同步看到最新行程。
                                            </p>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-8 bg-slate-950/80 border-t border-white/5 flex justify-center shadow-2xl">
                                    <button onClick={closeModal} className="text-slate-500 hover:text-cyan-400 font-black transition-all duration-300 text-[10px] tracking-widest uppercase">返回行程列表</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
