<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上輋七遊濟州</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase Compat Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .text-shadow { text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyBPO4VEzvUkuAZlDphTN6M7K7BORmkGePQ",
            authDomain: "dinnerbase.firebaseapp.com",
            projectId: "dinnerbase",
            storageBucket: "dinnerbase.firebasestorage.app",
            messagingSenderId: "26681451491",
            appId: "1:26681451491:web:50c1788cdceefcc343b6d6"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'jeju-travel-2026-v2';

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                MapPin: <><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></>,
                Car: <><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 13.1v2.9c0 .6.4 1 1 1h2" /><circle cx="7" cy="17" r="2" /><circle cx="17" cy="17" r="2" /></>,
                Utensils: <><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2" /><path d="M7 2v20" /><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" /></>,
                Home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></>,
                X: <><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></>,
                Save: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" /><polyline points="17 21 17 13 7 13 7 21" /><polyline points="7 3 7 8 15 8" /></>,
                Edit3: <><path d="M12 20h9" /><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" /></>,
                Unlock: <><path d="M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2zM7 11V7a5 5 0 0 1 10 0v4" /></>,
                Cloud: <><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.1-3.9-4.5-1.1-2.9-3.9-5-7.1-5-3.3 0-6.1 2.2-7.1 5.2-2.1.5-3.9 2.4-3.9 4.8C0 17.5 2 19.5 4.5 19.5" /></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [selectedDay, setSelectedDay] = useState(null);
            const [isEditing, setIsEditing] = useState(false);
            const [activeTab, setActiveTab] = useState('attractions');
            const [loading, setLoading] = useState(true);

            const initialData = {
                0: { date: "27/7", day: "星期一", title: "漢拏山國家公園", img: "01.png", transport: "", food: "", attractions: "", lodging: "" },
                1: { date: "28/7", day: "星期二", title: "大浦柱狀節理帶", img: "02.jpg", transport: "", food: "", attractions: "", lodging: "" },
                2: { date: "29/7", day: "星期三", title: "廣明洞", img: "03.jpg", transport: "", food: "", attractions: "", lodging: "" },
                3: { date: "30/7", day: "星期四", title: "正房瀑布", img: "04.jpg", transport: "", food: "", attractions: "", lodging: "" },
                4: { date: "31/7", day: "星期五", title: "綠淵潭", img: "05.jpg", transport: "", food: "", attractions: "", lodging: "" },
                5: { date: "1/8", day: "星期六", title: "獨立岩", img: "06.jpg", transport: "", food: "", attractions: "", lodging: "" },
            };

            const [travelData, setTravelData] = useState(initialData);
            const [editBuffer, setEditBuffer] = useState("");

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) {
                        setLoading(false);
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const travelPath = `artifacts/${appId}/public/data/travelPlan`;
                const unsubscribe = db.collection(travelPath).onSnapshot((snapshot) => {
                    const updatedData = { ...initialData };
                    snapshot.forEach((doc) => {
                        const dayKey = parseInt(doc.id);
                        if (updatedData.hasOwnProperty(dayKey)) {
                            updatedData[dayKey] = { ...updatedData[dayKey], ...doc.data() };
                        }
                    });
                    setTravelData(updatedData);
                    setLoading(false);
                }, () => setLoading(false));
                return () => unsubscribe();
            }, [user]);

            const handleSave = async (dayIndex, category) => {
                if (!user) return;
                const travelPath = `artifacts/${appId}/public/data/travelPlan`;
                try {
                    await db.collection(travelPath).doc(dayIndex.toString()).set({ [category]: editBuffer }, { merge: true });
                    setIsEditing(false);
                } catch (error) {
                    alert("儲存失敗");
                }
            };

            const tabs = [
                { id: 'transport', label: '交通', icon: "Car" },
                { id: 'food', label: '美食', icon: "Utensils" },
                { id: 'attractions', label: '景點', icon: "MapPin" },
                { id: 'lodging', label: '住宿', icon: "Home" },
            ];

            const closeModal = () => { setSelectedDay(null); setIsEditing(false); };
            const handleImageError = (e) => { e.target.style.display = 'none'; e.target.parentElement.style.backgroundColor = '#1e293b'; };

            if (loading && !user) {
                return (
                    <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-cyan-500 font-black gap-4">
                        <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-cyan-500"></div>
                        <div className="animate-pulse tracking-widest text-xs uppercase">正在連接雲端...</div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-950 text-white p-4 sm:p-8 animate-in">
                    <header className="max-w-7xl mx-auto text-center mb-12">
                        <h1 className="text-5xl font-black mb-4 bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-500 tracking-tight text-shadow">上輋七遊濟州</h1>
                        <div className="flex flex-col items-center gap-2">
                            <div className="inline-block px-5 py-1.5 rounded-full bg-slate-800 border border-slate-700 text-slate-400 text-sm font-bold shadow-2xl">2026年 7月27日 至 8月1日</div>
                            <div className="text-[10px] text-slate-600 flex items-center gap-1.5 uppercase tracking-widest font-bold">
                                <Icon name="Cloud" size={12} /> {user ? '多人同步模式已開啟' : '離線模式'}
                            </div>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto">
                        {Object.keys(travelData).map((key) => {
                            const item = travelData[key];
                            return (
                                <div key={key} onClick={() => { setSelectedDay(key); setEditBuffer(travelData[key][activeTab] || ""); setIsEditing(false); }}
                                    className="group relative h-80 rounded-[2.5rem] overflow-hidden cursor-pointer shadow-2xl transition-all duration-500 hover:-translate-y-2 bg-slate-900 border border-white/5">
                                    <img src={item.img} alt={item.title} className="absolute inset-0 w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" onError={handleImageError} />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/95 via-black/10 to-transparent" />
                                    <div className="absolute inset-0 p-8 flex flex-col justify-end">
                                        <div className="flex items-center gap-3 mb-3">
                                            <div className="bg-cyan-500 text-slate-950 px-3 py-1 rounded-lg font-black text-sm shadow-lg">{item.date}</div>
                                            <div className="text-cyan-400 font-black tracking-widest text-sm uppercase">{item.day}</div>
                                        </div>
                                        <h2 className="text-3xl font-black text-white group-hover:text-cyan-400 transition-colors drop-shadow-xl">{item.title}</h2>
                                        <div className="mt-4 w-12 h-1 bg-cyan-500/30 rounded-full transition-all duration-500 group-hover:w-full group-hover:bg-cyan-400" />
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {selectedDay !== null && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-2 sm:p-4 bg-black/95 backdrop-blur-xl">
                            <div className="bg-[#0b1120] w-full max-w-5xl h-[92vh] rounded-[3.5rem] overflow-hidden shadow-2xl border border-white/10 flex flex-col animate-in">
                                
                                {/* 頂部標題區 (Heading) - 緊湊上移 */}
                                <div className="relative h-32 flex-shrink-0 bg-slate-800">
                                    <img src={travelData[selectedDay].img} className="w-full h-full object-cover opacity-40" alt="header" onError={handleImageError} />
                                    <div className="absolute inset-0 bg-gradient-to-b from-black/40 to-[#0b1120]" />
                                    <button onClick={closeModal} className="absolute top-4 right-6 p-2 bg-black/50 rounded-full text-white hover:bg-black/80 transition-all border border-white/10 shadow-lg z-20"><Icon name="X" size={24} /></button>
                                    <div className="absolute bottom-4 left-10 right-10 flex items-end justify-between">
                                        <div>
                                            <div className="flex items-center gap-2 mb-1">
                                                <span className="bg-cyan-500 text-slate-950 px-2 py-0.5 rounded-lg text-[10px] font-black uppercase shadow-lg">DAY {parseInt(selectedDay) + 1}</span>
                                                <span className="text-cyan-300 font-bold text-sm tracking-wide">{travelData[selectedDay].date} ({travelData[selectedDay].day})</span>
                                            </div>
                                            <h3 className="text-3xl sm:text-4xl font-black text-white tracking-tighter drop-shadow-2xl">{travelData[selectedDay].title}</h3>
                                        </div>
                                    </div>
                                </div>

                                {/* 導航分頁欄 - 縮小按鈕尺寸, 圖標小字平放居中 (按 image_860ba4.png 設計) */}
                                <div className="flex justify-center gap-2 sm:gap-4 py-4 bg-[#0b1120] border-b border-white/5">
                                    {tabs.map((tab) => (
                                        <button key={tab.id} onClick={() => { setActiveTab(tab.id); setEditBuffer(travelData[selectedDay][tab.id] || ""); setIsEditing(false); }}
                                            className={`px-4 py-1.5 rounded-full transition-all duration-300 flex items-center gap-2 border ${activeTab === tab.id ? 'bg-cyan-500/10 text-cyan-400 border-cyan-500/50 shadow-[0_0_15px_rgba(6,182,212,0.1)]' : 'text-slate-500 border-transparent hover:text-slate-300'}`}>
                                            <Icon name={tab.icon} size={14} />
                                            <span className="text-xs font-bold uppercase tracking-widest">{tab.label}</span>
                                        </button>
                                    ))}
                                </div>

                                {/* 內容填寫區 - 上移並高度極大化 */}
                                <div className="flex-1 flex flex-col p-4 sm:p-6 overflow-hidden bg-[#0b1120]">
                                    {!isEditing ? (
                                        <div className="flex-1 flex flex-col h-full animate-in relative">
                                            {/* 文字顯示框 (Enlarge with height) */}
                                            <div className="flex-1 bg-slate-950/20 border border-white/10 rounded-[2.5rem] p-6 sm:p-10 mb-4 overflow-y-auto text-slate-200 text-2xl sm:text-3xl font-light leading-relaxed shadow-inner no-scrollbar">
                                                {travelData[selectedDay][activeTab] || "這裡目前沒有資訊... 點擊下方按鈕開始記錄與成員分享吧！"}
                                            </div>
                                            
                                            <div className="flex items-center justify-between px-2">
                                                <div className="flex items-center gap-2 text-slate-500 opacity-50">
                                                    <Icon name="MapPin" size={16} />
                                                    <span className="text-xs font-bold uppercase tracking-widest">{tabs.find(t => t.id === activeTab).label} 資訊欄</span>
                                                </div>
                                                <button 
                                                    onClick={() => { setEditBuffer(travelData[selectedDay][activeTab] || ""); setIsEditing(true); }} 
                                                    className="bg-slate-800/80 text-cyan-400 px-8 py-3 rounded-2xl text-sm font-black shadow-lg hover:bg-slate-700 transition-all border border-slate-700 active:scale-95 flex items-center gap-2"
                                                >
                                                    <Icon name="Edit3" size={16} />編輯內容
                                                </button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="flex-1 flex flex-col h-full animate-in">
                                            {/* 編輯輸入框 (Enlarge with height) */}
                                            <textarea 
                                                autoFocus 
                                                value={editBuffer} 
                                                onChange={(e) => setEditBuffer(e.target.value)} 
                                                className="flex-1 bg-slate-950/40 border-2 border-cyan-500/30 rounded-[2.5rem] p-6 sm:p-10 mb-4 text-slate-100 text-2xl leading-relaxed focus:ring-4 focus:ring-cyan-500/10 outline-none shadow-inner transition-all resize-none no-scrollbar" 
                                                placeholder={`在此輸入關於 ${tabs.find(t => t.id === activeTab).label} 的行程規劃...`}
                                            />
                                            
                                            <div className="flex items-center justify-between px-2">
                                                <div className="flex items-center gap-2 text-green-400 font-black opacity-80">
                                                    <Icon name="Unlock" size={20} />
                                                    <span className="text-xs uppercase tracking-tighter">多人即時同步中</span>
                                                </div>
                                                <div className="flex gap-4">
                                                    <button onClick={() => setIsEditing(false)} className="text-slate-400 text-sm font-bold hover:text-white transition-colors px-4">取消</button>
                                                    <button 
                                                        onClick={() => handleSave(selectedDay, activeTab)} 
                                                        className="bg-cyan-500 text-slate-950 px-10 py-3 rounded-2xl text-sm font-black shadow-cyan-500/40 shadow-2xl hover:bg-cyan-400 transition-all active:scale-95 flex items-center gap-2"
                                                    >
                                                        <Icon name="Save" size={18} />確認儲存
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {/* 底部標籤與返回 */}
                                <div className="p-4 sm:p-6 bg-slate-950/40 border-t border-white/5 flex justify-center">
                                    <button onClick={closeModal} className="text-slate-600 hover:text-cyan-400 font-bold transition-all duration-300 text-xs tracking-widest uppercase">
                                        返回行程列表
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
