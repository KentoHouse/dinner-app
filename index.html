<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上輋族 - 官方網頁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Bungee+Shade&display=swap');

        :root {
            --neon-purple: #bc13fe;
            --neon-pink: #ff00de;
        }

        body {
            font-family: 'ZCOOL KuaiLe', cursive;
            margin: 0;
            background-color: #000; 
            color: white;
            overflow-x: hidden;
        }

        /* --- 背景相片設定區 --- */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-image: url('shch.jpg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            background-attachment: fixed;
            filter: brightness(0.65) contrast(1.1);
        }

        /* 霓虹光暈裝飾 */
        .neon-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(188, 19, 254, 0.3) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
            pointer-events: none;
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            to { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
        }

        .main-title {
            font-family: 'Bungee Shade', cursive;
            text-shadow: 0 0 15px var(--neon-purple), 0 0 30px var(--neon-pink);
            letter-spacing: 0.1em;
        }

        .nav-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-card:hover {
            transform: translateY(-10px);
            border-color: var(--neon-pink);
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="bg-container"></div>
    <div class="neon-glow"></div>

    <div id="home-page" class="flex flex-col items-center">
        <h1 class="main-title text-6xl md:text-8xl font-bold mb-16 text-white text-center">
            上輋族
        </h1>

        <div class="flex flex-col md:flex-row gap-10 items-center justify-center">
            
            <!-- 報飯按鈕：連結至 dinner.html -->
            <a href="dinner.html" class="nav-card p-10 rounded-[40px] w-72 cursor-pointer group">
                <div class="w-24 h-24 mb-6 flex items-center justify-center bg-orange-500/10 rounded-full border border-orange-500/20">
                    <svg viewBox="0 0 24 24" class="w-16 h-16 text-orange-400" fill="currentColor">
                        <path d="M2 12c0 5.5 4.5 10 10 10s10-4.5 10-10H2z"/>
                        <path d="M12 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" opacity="0.6"/>
                    </svg>
                </div>
                <h2 class="text-3xl font-bold text-white tracking-widest">[報飯]</h2>
            </a>

            <!-- 濟州按鈕：連結至 travel.html -->
            <a href="travel.html" class="nav-card p-10 rounded-[40px] w-72 cursor-pointer group">
                <div class="w-24 h-24 mb-6 flex items-center justify-center bg-blue-500/10 rounded-full border border-blue-500/20">
                    <svg viewBox="0 0 24 24" class="w-16 h-16 text-blue-400" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="4" y="7" width="16" height="13" rx="2"/>
                        <path d="M16 7V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v3"/>
                        <path d="M12 12v4M8 12v4M16 12v4"/>
                    </svg>
                </div>
                <h2 class="text-3xl font-bold text-white tracking-widest">[濟州]</h2>
            </a>

        </div>
    </div>

</body>
</html>
