<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上輋報飯系統 - 多人同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .btn-active-orange { background-color: #f97316; color: white; box-shadow: 0 4px 6px -1px rgba(249, 115, 22, 0.4); }
        .btn-active-blue { background-color: #3b82f6; color: white; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.4); }
        .btn-active-indigo { background-color: #6366f1; color: white; box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4); }
        .btn-inactive { background-color: white; color: #94a3b8; border: 1px solid #e2e8f0; }
        .btn-locked { opacity: 0.85; border: 2px solid #cbd5e1; cursor: default; }
        .loading-overlay { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 50; transition: opacity 0.5s; }
        .status-badge { transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 p-4 md:p-8">
    <div id="loader" class="loading-overlay">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500"></div>
            <p class="mt-4 text-slate-500 font-medium text-sm">正在從雲端同步數據...</p>
        </div>
    </div>

    <div id="app" class="max-w-2xl mx-auto opacity-0 transition-opacity duration-500">
        <div class="bg-white rounded-3xl p-6 shadow-sm mb-6 border border-slate-100">
            <div class="flex items-center gap-4">
                <div class="bg-orange-100 p-3 rounded-2xl text-orange-600">
                    <i data-lucide="chef-hat" class="w-8 h-8"></i>
                </div>
                <div class="flex-1">
                    <div class="flex items-center justify-between flex-wrap gap-2">
                        <div class="flex items-baseline gap-3">
                            <h1 class="text-2xl font-bold text-slate-800">上輋報飯</h1>
                            <span id="week-display" class="text-orange-500 font-bold text-lg"></span>
                        </div>
                        <div id="sync-status" class="status-badge flex items-center gap-1 text-[10px] bg-slate-100 text-slate-500 px-2 py-1 rounded-full">
                            <span class="w-1.5 h-1.5 bg-slate-400 rounded-full"></span>
                            <span id="status-text">連線中...</span>
                        </div>
                    </div>
                    <p class="text-slate-500 text-xs mt-1">💡 全家即時同步。點擊即鎖定，連按 3 次可解除。</p>
                </div>
            </div>
        </div>

        <div id="days-container" class="space-y-6"></div>

        <div class="mt-8 bg-slate-800 rounded-3xl p-6 text-white shadow-xl">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold flex items-center gap-2">
                    <i data-lucide="clipboard-list" class="w-5 h-5 text-orange-400"></i>
                    數據彙整 (全家即時)
                </h3>
                <button onclick="copySummary()" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl flex items-center gap-2 transition-all text-sm">
                    <span id="copy-btn-text" class="flex items-center gap-2"><i data-lucide="copy" class="w-4 h-4"></i> 複製摘要</span>
                </button>
            </div>
            <div id="summary-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </div>
        <p class="text-center text-slate-400 text-[10px] mt-8 mb-12 uppercase tracking-widest">Global Sync Active • kentohouse.com</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDDAdMH0TWQ1kYTuKFhAz9KP1Y2RAt-P84",
            authDomain: "dinnerbase.firebaseapp.com",
            projectId: "dinnerbase",
            storageBucket: "dinnerbase.firebasestorage.app",
            messagingSenderId: "26681451491",
            appId: "1:26681451491:web:50c1788cdceefcc343b6d6"
        };

        const fbApp = initializeApp(firebaseConfig);
        const auth = getAuth(fbApp);
        const db = getFirestore(fbApp);

        // appId 必須與 Firestore Rules 中的路徑一致
        const appId = 'dinnerbase-v2';
        const MEMBERS = ['Jason', 'Cheryl', 'Cher'];
        const COOKING_DAYS = [
            { id: 'mon', label: '星期一 (Monday)', icon: 'utensils' },
            { id: 'tue', label: '星期二 (Tuesday)', icon: 'utensils' },
            { id: 'thu', label: '星期四 (一齊出街食)', icon: 'store' }
        ];

        let localState = {};
        let clickCounters = {}; 
        let lastClickTime = {}; 

        function initBaseState() {
            const empty = {};
            COOKING_DAYS.forEach(day => {
                empty[day.id] = {};
                clickCounters[day.id] = {};
                lastClickTime[day.id] = {};
                MEMBERS.forEach(m => {
                    empty[day.id][m] = { dinner: false, lunchBox: false };
                    clickCounters[day.id][m] = { dinner: 0, lunchBox: 0 };
                    lastClickTime[day.id][m] = { dinner: 0, lunchBox: 0 };
                });
            });
            return empty;
        }

        localState = initBaseState();

        const updateStatus = (type, message) => {
            const badge = document.getElementById('sync-status');
            const text = document.getElementById('status-text');
            const dot = badge.querySelector('span');
            
            if (type === 'success') {
                badge.className = "status-badge flex items-center gap-1 text-[10px] bg-green-100 text-green-600 px-2 py-1 rounded-full";
                dot.className = "w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse";
                text.innerText = message || "雲端已同步";
            } else {
                badge.className = "status-badge flex items-center gap-1 text-[10px] bg-red-100 text-red-600 px-2 py-1 rounded-full";
                dot.className = "w-1.5 h-1.5 bg-red-500 rounded-full";
                text.innerText = message || "同步錯誤";
            }
        };

        const startSync = (weekId) => {
            // 嚴格路徑格式：/artifacts/{appId}/public/data/{collectionName}/{docId}
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'weekly_votes', weekId);

            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    localState = docSnap.data().votes;
                    render();
                    updateStatus('success');
                } else {
                    setDoc(docRef, { votes: initBaseState() });
                }
                
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('app').classList.remove('opacity-0');
                }, 500);
            }, (err) => {
                console.error("Firebase Sync Error:", err);
                updateStatus('error', "權限不足，請檢查 Firebase Rules");
            });
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const weekInfo = getWeekInfo();
                startSync(weekInfo.weekId);
            }
        });

        const init = async () => {
            try {
                await signInAnonymously(auth);
            } catch (e) {
                console.error("Auth Error", e);
                updateStatus('error', "登入失敗");
            }
        };

        init();

        window.handleBtnClick = async (dayId, member, type) => {
            const now = Date.now();
            const isActive = localState[dayId][member][type];

            if (now - (lastClickTime[dayId][member][type] || 0) > 1000) {
                clickCounters[dayId][member][type] = 0; 
            }
            lastClickTime[dayId][member][type] = now;

            if (!isActive) {
                localState[dayId][member][type] = true;
                await updateCloud();
            } else {
                clickCounters[dayId][member][type]++;
                render(); 
                if (clickCounters[dayId][member][type] >= 3) {
                    localState[dayId][member][type] = false;
                    clickCounters[dayId][member][type] = 0;
                    await updateCloud();
                }
            }
        };

        async function updateCloud() {
            const weekId = getWeekInfo().weekId;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'weekly_votes', weekId);
            try { 
                await setDoc(docRef, { votes: localState });
                updateStatus('success', "儲存成功");
            } catch (e) { 
                console.error("Cloud Write Error:", e);
                updateStatus('error', "寫入失敗");
            }
        }

        function getWeekInfo() {
            const now = new Date();
            const dayOfWeek = now.getDay();
            const diffToMon = dayOfWeek === 0 ? 1 : (dayOfWeek > 4 ? (8 - dayOfWeek) : (1 - dayOfWeek));
            const monday = new Date(now);
            monday.setDate(now.getDate() + diffToMon);
            const thursday = new Date(monday);
            thursday.setDate(monday.getDate() + 3);
            const weekNum = Math.ceil((((monday - new Date(now.getFullYear(), 0, 1)) / 86400000) + 1) / 7);
            const formatDate = (d) => `${d.getDate()}/${d.getMonth() + 1}`;
            return { 
                weekStr: `WK${weekNum}`, 
                rangeStr: `${formatDate(monday)}-${formatDate(thursday)}`,
                weekId: `wk_${now.getFullYear()}_${weekNum}`
            };
        }

        function render() {
            const weekInfo = getWeekInfo();
            document.getElementById('week-display').innerHTML = `${weekInfo.weekStr} <span class="text-slate-400 text-sm font-normal">(${weekInfo.rangeStr})</span>`;
            const container = document.getElementById('days-container');
            container.innerHTML = COOKING_DAYS.map(day => `
                <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                    <h2 class="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                        <div class="w-2 h-6 rounded-full ${day.id === 'thu' ? 'bg-blue-400' : 'bg-orange-400'}"></div>
                        ${day.label}
                    </h2>
                    <div class="grid gap-3">
                        ${MEMBERS.map(m => `
                            <div class="flex items-center justify-between p-3 rounded-2xl bg-slate-50 border border-slate-100">
                                <span class="font-semibold text-slate-700 ml-2">${m}</span>
                                <div class="flex gap-2">
                                    ${renderBtn(day.id, m, 'dinner', day.id === 'thu' ? 'users' : 'utensils', day.id === 'thu' ? '參與' : '晚飯', day.id === 'thu' ? 'btn-active-blue' : 'btn-active-orange')}
                                    ${day.id !== 'thu' ? renderBtn(day.id, m, 'lunchBox', 'briefcase', '帶飯', 'btn-active-indigo') : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`).join('');
            updateSummary();
            lucide.createIcons();
        }

        function renderBtn(dayId, member, type, icon, label, activeClass) {
            const val = localState[dayId][member][type];
            const count = clickCounters[dayId][member][type];
            const displayIcon = val ? 'lock' : icon;
            const currentClass = val ? `${activeClass} btn-locked` : 'btn-inactive';
            return `
                <button onclick="window.handleBtnClick('${dayId}', '${member}', '${type}')" 
                    class="relative flex items-center gap-2 px-4 py-2 rounded-xl text-xs md:text-sm font-bold transition-all ${currentClass}">
                    <i data-lucide="${displayIcon}" class="w-3.5 h-3.5"></i>
                    ${label}
                    ${count > 0 ? `<span class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center border-2 border-white font-black">${count}</span>` : ''}
                </button>
            `;
        }

        function updateSummary() {
            const summaryGrid = document.getElementById('summary-grid');
            summaryGrid.innerHTML = COOKING_DAYS.map(day => {
                const dinners = MEMBERS.filter(m => localState[day.id][m].dinner).length;
                const boxes = MEMBERS.filter(m => localState[day.id][m].lunchBox).length;
                const isThu = day.id === 'thu';
                return `
                    <div class="bg-white/5 rounded-2xl p-4 border border-white/5">
                        <p class="text-slate-400 text-[10px] uppercase mb-1">${day.label.split(' ')[0]}</p>
                        <div class="flex justify-between items-end">
                            <div><p class="text-2xl font-black ${isThu ? 'text-blue-300' : 'text-orange-300'}">${dinners}</p><p class="text-[9px] uppercase text-slate-500 font-bold">${isThu ? '人數' : '晚飯'}</p></div>
                            ${!isThu ? `<div class="text-right"><p class="text-2xl font-black text-indigo-300">${boxes}</p><p class="text-[9px] uppercase text-slate-500 font-bold">帶飯</p></div>` : ''}
                        </div>
                    </div>`;
            }).join('');
        }

        window.copySummary = () => {
            const weekInfo = getWeekInfo();
            let summary = `📅 ${weekInfo.weekStr} (${weekInfo.rangeStr}) 報飯摘要\n------------------\n`;
            COOKING_DAYS.forEach(day => {
                const dinnerList = MEMBERS.filter(m => localState[day.id][m].dinner);
                const lunchList = MEMBERS.filter(m => localState[day.id][m].lunchBox);
                summary += `【${day.label}】\n${day.id === 'thu' ? '🚶 出街' : '🍚 晚飯'} (${dinnerList.length}人): ${dinnerList.join(', ') || '無'}\n`;
                if (day.id !== 'thu') summary += `🍱 帶飯 (${lunchList.length}個): ${lunchList.join(', ') || '無'}\n`;
                summary += "\n";
            });
            const el = document.createElement("textarea"); el.value = summary; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            const btnText = document.getElementById('copy-btn-text'); const original = btnText.innerHTML;
            btnText.innerHTML = '<i data-lucide="check-circle-2" class="w-4 h-4 text-green-400"></i> 已複製！';
            lucide.createIcons(); setTimeout(() => { btnText.innerHTML = original; lucide.createIcons(); }, 2000);
        }
    </script>
</body>
</html>
